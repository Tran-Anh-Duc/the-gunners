services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: The Gunners
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:18080
      APP_LOCALE: vi
      APP_FALLBACK_LOCALE: en
      LOG_CHANNEL: stack
      LOG_LEVEL: debug
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: the_gunners
      DB_USERNAME: the_gunners
      DB_PASSWORD: secret
      MYSQL_ATTR_SSL_CA: ${MYSQL_ATTR_SSL_CA:-}
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      FILESYSTEM_DISK: local
      JWT_SECRET: ${JWT_SECRET}
      ALLOW_DESTRUCTIVE_DB_COMMANDS: ${ALLOW_DESTRUCTIVE_DB_COMMANDS:-false}
      PUPPETEER_EXECUTABLE_PATH: /usr/local/bin/chromium-no-sandbox
    ports:
      - "18080:80"
    restart: unless-stopped
    volumes:
      - ./app:/var/www/html/app
      - ./artisan:/var/www/html/artisan
      - ./bootstrap/app.php:/var/www/html/bootstrap/app.php
      - ./config:/var/www/html/config
      - ./database:/var/www/html/database
      - ./lang:/var/www/html/lang
      - ./resources:/var/www/html/resources
      - ./routes:/var/www/html/routes
      - ./tests:/var/www/html/tests
      - ./composer.json:/var/www/html/composer.json
      - ./composer.lock:/var/www/html/composer.lock
      - ./package.json:/var/www/html/package.json
      - ./phpunit.xml:/var/www/html/phpunit.xml
      - ./vite.config.js:/var/www/html/vite.config.js
      - app_storage:/var/www/html/storage

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: the_gunners
      MYSQL_USER: the_gunners
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "13307:3306"
    restart: unless-stopped
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5-apache
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 128M
    ports:
      - "18081:80"
    restart: unless-stopped

volumes:
  app_storage:
  mysql_data:
